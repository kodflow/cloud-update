name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    # Test ALL pull requests

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Mount bazel cache
        uses: actions/cache@v4
        with:
          path: "~/.cache/bazel"
          key: bazel-${{ runner.os }}-${{ hashFiles('WORKSPACE', 'MODULE.bazel', '.bazelrc') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Run unit tests
        run: bazel test //src/internal/... //src/cmd/... --test_output=errors

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Mount bazel cache
        uses: actions/cache@v4
        with:
          path: "~/.cache/bazel"
          key: bazel-${{ runner.os }}-${{ hashFiles('WORKSPACE', 'MODULE.bazel', '.bazelrc') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Build binary
        run: bazel build //src/cmd/cloud-update:cloud-update

      - name: Test binary
        run: |
          bazel-bin/src/cmd/cloud-update/cloud-update_/cloud-update --version
          bazel-bin/src/cmd/cloud-update/cloud-update_/cloud-update --help