name: CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  pull-requests: write
  issues: write

jobs:
  # Analyze job - runs in parallel with test
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m ./src/...
          skip-cache: true

  # Unit tests job - runs in parallel with analyze
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3
        with:
          bazelisk-version: '1.x'

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-test-v2-${{ runner.os }}-${{ hashFiles('go.mod', 'go.sum') }}
          restore-keys: |
            bazel-test-v2-${{ runner.os }}-
            bazel-test-v2-

      - name: Run unit tests
        run: bazel test --config=ci //src/internal/... //src/cmd/...

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: bazel-testlogs/**/*.xml
          retention-days: 7

  # Build job - waits for BOTH analyze and test to complete, generates version
  build:
    runs-on: ubuntu-latest
    needs: [analyze, test]
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            VERSION="v$(date +%Y.%m.%d)-${GITHUB_SHA::8}"
          else
            VERSION="v0.0.0-dev-${GITHUB_SHA::8}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${VERSION#v}" >> "$GITHUB_OUTPUT"
          echo "📦 Version: ${VERSION}"

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3
        with:
          bazelisk-version: '1.x'

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-build-v2-${{ runner.os }}-${{ hashFiles('go.mod', 'go.sum') }}
          restore-keys: |
            bazel-build-v2-${{ runner.os }}-
            bazel-build-v2-

      - name: Build Linux binary
        run: |
          bazel build --config=ci \
            --platforms=@io_bazel_rules_go//go/toolchain:linux_amd64 \
            //src/cmd/cloud-update:cloud-update \
            --workspace_status_command="echo BUILD_VERSION ${{ steps.version.outputs.version }}"
          
          # Prepare for E2E tests
          mkdir -p dist
          cp bazel-bin/src/cmd/cloud-update/cloud-update_/cloud-update dist/cloud-update
          chmod +x dist/cloud-update

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloud-update-binary
          path: dist/cloud-update
          retention-days: 1

  # E2E tests - run in parallel after build
  e2e:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        init_system:
          - { name: openrc, distro: alpine }
          - { name: systemd, distro: ubuntu }
          - { name: sysvinit, distro: debian }
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: cloud-update-binary
          path: dist

      - name: Prepare binary for container
        run: |
          # The E2E test script expects the binary in a specific location
          mkdir -p dist/cloud-update_linux_amd64_v1
          cp dist/cloud-update dist/cloud-update_linux_amd64_v1/cloud-update
          chmod +x dist/cloud-update_linux_amd64_v1/cloud-update

      - name: Run E2E test for ${{ matrix.init_system.name }}
        run: |
          if [ -f .env.test ]; then
            source .env.test
          fi
          chmod +x src/test/e2e/test_distro.sh
          ./src/test/e2e/test_distro.sh ${{ matrix.init_system.distro }}

      - name: Clean up containers
        if: always()
        run: docker compose -f src/test/e2e/docker-compose.yml down --volumes --remove-orphans || true

  # Final release job
  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [build, e2e]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3
        with:
          bazelisk-version: '1.x'

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-release-v2-${{ runner.os }}-${{ hashFiles('go.mod', 'go.sum') }}
          restore-keys: |
            bazel-release-v2-${{ runner.os }}-
            bazel-release-v2-

      - name: Build release binaries
        run: |
          # Build for multiple platforms
          for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            OS=$(echo $platform | cut -d/ -f1)
            ARCH=$(echo $platform | cut -d/ -f2)
            echo "Building for $OS/$ARCH..."
            
            bazel build --config=ci \
              --platforms=@io_bazel_rules_go//go/toolchain:${OS}_${ARCH} \
              //src/cmd/cloud-update:cloud-update \
              --workspace_status_command="echo BUILD_VERSION ${{ steps.version.outputs.version }}"
            
            mkdir -p dist/cloud-update-${OS}-${ARCH}
            cp bazel-bin/src/cmd/cloud-update/cloud-update_/cloud-update* dist/cloud-update-${OS}-${ARCH}/ || \
            cp bazel-bin/src/cmd/cloud-update/cloud-update_/cloud-update dist/cloud-update-${OS}-${ARCH}/
          done

      - name: Create tag
        run: |
          TAG="${{ needs.build.outputs.version }}"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: Release ${{ needs.build.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}