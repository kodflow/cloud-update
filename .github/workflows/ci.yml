name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    # Test ALL pull requests, regardless of target branch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: |
          go install github.com/goreleaser/goreleaser/v2@latest
          go mod download
          go mod verify

      - name: Run unit tests
        run: make test-unit

      - name: Run E2E tests
        run: make test-e2e

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: |
          go install github.com/goreleaser/goreleaser/v2@latest
          go mod download
          go mod verify

      - name: Build
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          make build

      - name: Test binary
        run: |
          ls -la dist/
          ./dist/cloud-update_linux_amd64*/cloud-update --version
          ./dist/cloud-update_linux_amd64*/cloud-update --help