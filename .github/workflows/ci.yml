name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    # Test ALL pull requests

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Mount bazel cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-v2-${{ runner.os }}-${{ hashFiles('WORKSPACE', 'MODULE.bazel', 'go.mod', 'go.sum') }}
          restore-keys: |
            bazel-v2-${{ runner.os }}-
            bazel-v2-

      - name: Run unit tests
        run: bazel test //src/internal/... //src/cmd/... --test_output=errors

  e2e:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - init_system: openrc
            distro: alpine
          - init_system: systemd
            distro: ubuntu
          - init_system: sysvinit
            distro: debian
      fail-fast: false  # Continue running other tests even if one fails
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Mount bazel cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-v2-${{ runner.os }}-${{ hashFiles('WORKSPACE', 'MODULE.bazel', 'go.mod', 'go.sum') }}
          restore-keys: |
            bazel-v2-${{ runner.os }}-
            bazel-v2-

      - name: Load test environment
        run: |
          if [ -f .env.test ]; then
            # Filter out comments and empty lines before adding to GITHUB_ENV
            grep -v '^#' .env.test | grep -v '^$' >> $GITHUB_ENV
          fi

      - name: Run E2E test for ${{ matrix.init_system }} (${{ matrix.distro }})
        run: |
          chmod +x src/test/e2e/test_distro.sh
          ./src/test/e2e/test_distro.sh ${{ matrix.distro }}

      - name: Clean up on failure
        if: failure()
        run: docker compose -f src/test/e2e/docker-compose.yml down --volumes --remove-orphans

  build:
    runs-on: ubuntu-latest
    needs: [test, e2e]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Mount bazel cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-v2-${{ runner.os }}-${{ hashFiles('WORKSPACE', 'MODULE.bazel', 'go.mod', 'go.sum') }}
          restore-keys: |
            bazel-v2-${{ runner.os }}-
            bazel-v2-

      - name: Build binary
        run: bazel build //src/cmd/cloud-update:cloud-update

      - name: Test binary
        run: |
          bazel-bin/src/cmd/cloud-update/cloud-update_/cloud-update --version
          bazel-bin/src/cmd/cloud-update/cloud-update_/cloud-update --help