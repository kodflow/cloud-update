name: CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  pull-requests: write
  issues: write

jobs:
  # Single job that handles everything except release
  ci:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      # === SETUP PHASE ===
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/heads/main ]]; then
            VERSION="v$(date +%Y.%m.%d)-${GITHUB_SHA::8}"
          else
            VERSION="v0.0.0-dev-${GITHUB_SHA::8}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "📦 Version: ${VERSION}"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
            bazel-bin
            bazel-out
          key: bazel-v3-${{ runner.os }}-${{ hashFiles('WORKSPACE', 'MODULE.bazel', 'go.mod', 'go.sum') }}
          restore-keys: |
            bazel-v3-${{ runner.os }}-
            bazel-v3-

      # === ANALYZE PHASE ===
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m ./src/...
          skip-cache: true  # Use Go cache instead

      # === BUILD PHASE (build once, use everywhere) ===
      - name: Build binary
        run: |
          bazel build //src/cmd/cloud-update:cloud-update \
            --stamp \
            --workspace_status_command="echo BUILD_VERSION ${{ steps.version.outputs.version }}"
          
          # Copy binary to a known location
          cp bazel-bin/src/cmd/cloud-update/cloud-update_/cloud-update ./cloud-update
          chmod +x ./cloud-update

      - name: Test binary
        run: |
          ./cloud-update --version
          ./cloud-update --help

      # === TEST PHASE ===
      - name: Run unit tests
        run: bazel test //src/internal/... //src/cmd/... --test_output=errors --cache_test_results=no

      # === E2E PHASE (parallel) ===
      - name: Run E2E tests in parallel
        run: |
          if [ -f .env.test ]; then
            grep -v '^#' .env.test | grep -v '^$' >> $GITHUB_ENV
          fi
          chmod +x src/test/e2e/run_parallel.sh
          ./src/test/e2e/run_parallel.sh

      - name: Clean up containers
        if: always()
        run: docker compose -f src/test/e2e/docker-compose.yml down --volumes --remove-orphans || true

      # === ARTIFACTS ===
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: bazel-testlogs/**/*.xml
          retention-days: 7

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: cloud-update-${{ runner.os }}-${{ steps.version.outputs.tag }}
          path: ./cloud-update
          retention-days: 30

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cloud-update-*
          path: dist/

      - name: Create tag and release
        run: |
          TAG="${{ needs.ci.outputs.version }}"
          
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping..."
            exit 0
          fi
          
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.ci.outputs.version }}
          name: Release ${{ needs.ci.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}