name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    # Test ALL pull requests

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Mount bazel cache
        uses: actions/cache@v4
        with:
          path: "~/.cache/bazel"
          key: bazel-${{ runner.os }}-${{ hashFiles('WORKSPACE', 'MODULE.bazel', '.bazelrc') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Run unit tests
        run: bazel test //src/internal/... //src/cmd/... --test_output=errors

  e2e:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        distro: [alpine, ubuntu, debian, rockylinux, fedora, arch, opensuse]
      fail-fast: false  # Continue running other tests even if one fails
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Mount bazel cache
        uses: actions/cache@v4
        with:
          path: "~/.cache/bazel"
          key: bazel-${{ runner.os }}-${{ hashFiles('WORKSPACE', 'MODULE.bazel', '.bazelrc') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Load test environment
        run: |
          if [ -f .env.test ]; then
            cat .env.test >> $GITHUB_ENV
          fi

      - name: Run E2E test for ${{ matrix.distro }}
        run: |
          chmod +x scripts/test_distro.sh
          ./scripts/test_distro.sh ${{ matrix.distro }}

      - name: Clean up on failure
        if: failure()
        run: docker compose -f src/test/e2e/docker-compose.yml down --volumes --remove-orphans

  build:
    runs-on: ubuntu-latest
    needs: [test, e2e]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Mount bazel cache
        uses: actions/cache@v4
        with:
          path: "~/.cache/bazel"
          key: bazel-${{ runner.os }}-${{ hashFiles('WORKSPACE', 'MODULE.bazel', '.bazelrc') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Build binary
        run: bazel build //src/cmd/cloud-update:cloud-update

      - name: Test binary
        run: |
          bazel-bin/src/cmd/cloud-update/cloud-update_/cloud-update --version
          bazel-bin/src/cmd/cloud-update/cloud-update_/cloud-update --help