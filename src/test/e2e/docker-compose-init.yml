version: '3.8'

services:
  # Test OpenRC avec Alpine
  alpine-openrc:
    build:
      context: ../../..
      dockerfile: src/test/e2e/Dockerfile.alpine-openrc
    container_name: cloud-update-openrc
    ports:
      - "${E2E_PORT_ALPINE:-9991}:9999"
    environment:
      - CLOUD_UPDATE_SECRET=${E2E_SECRET}
      - CLOUD_UPDATE_PORT=9999
      - CLOUD_UPDATE_LOG_LEVEL=${CLOUD_UPDATE_LOG_LEVEL:-debug}
    networks:
      - cloud-update-test
    privileged: true
    command: /sbin/init

  # Test Systemd avec Fedora
  fedora-systemd:
    build:
      context: ../../..
      dockerfile: src/test/e2e/Dockerfile.fedora-systemd
    container_name: cloud-update-systemd
    ports:
      - "${E2E_PORT_FEDORA:-9992}:9999"
    environment:
      - CLOUD_UPDATE_SECRET=${E2E_SECRET}
      - CLOUD_UPDATE_PORT=9999
      - CLOUD_UPDATE_LOG_LEVEL=${CLOUD_UPDATE_LOG_LEVEL:-debug}
    networks:
      - cloud-update-test
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    command: /sbin/init

  # Test SysVInit avec Debian
  debian-sysvinit:
    build:
      context: ../../..
      dockerfile: src/test/e2e/Dockerfile.debian-sysvinit
    container_name: cloud-update-sysvinit
    ports:
      - "${E2E_PORT_DEBIAN:-9993}:9999"
    environment:
      - CLOUD_UPDATE_SECRET=${E2E_SECRET}
      - CLOUD_UPDATE_PORT=9999
      - CLOUD_UPDATE_LOG_LEVEL=${CLOUD_UPDATE_LOG_LEVEL:-debug}
    networks:
      - cloud-update-test
    privileged: true
    command: /sbin/init

networks:
  cloud-update-test:
    driver: bridge