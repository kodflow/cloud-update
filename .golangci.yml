version: '2'

linters:
  enable:
    - revive
    - godot
    - misspell
    - govet
    - staticcheck
    - ineffassign
    - errcheck
    - lll
    - gocritic
    - gosec
    - errorlint
    - wrapcheck
    - bodyclose
    - sqlclosecheck
    - prealloc
    - gocyclo
    - dogsled

linters-settings:
  revive:
    ignore-generated-header: true
    severity: error
    rules:
      - name: context-keys-type
      - name: time-naming
      - name: var-declaration
      - name: unexported-return
      - name: errorf
      - name: blank-imports
      - name: context-as-argument
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: indent-error-flow
      - name: argument-limit
        arguments: [5]
      - name: function-result-limit
        arguments: [3]
      - name: cognitive-complexity
        arguments: [30]
      - name: cyclomatic
        arguments: [15]
      - name: line-length-limit
        arguments: [120]

  gosec:
    severity: medium
    confidence: medium
    excludes:
      - G104 # Errors unhandled (covered by errcheck)
      - G307 # Deferring a method which returns an error

  gocyclo:
    min-complexity: 15


  errorlint:
    errorf: true
    asserts: true
    comparison: true

  gocritic:
    enabled-checks:
      - dupBranchBody
      - dupCase
      - dupSubExpr
      - nilValReturn
      - rangeExprCopy
      - rangeValCopy
      - singleCaseSwitch
      - unlambda
      - unslice
      - boolExprSimplify
      - equalFold
      - indexAlloc
      - captLocal
      - nestingReduce
      - ptrToRefParam
      - typeAssertChain
      - typeUnparen
      - unnecessaryBlock

  lll:
    line-length: 120
    tab-width: 1

  goimports:
    local-prefixes: github.com/kodflow/cloud-update

  gofumpt:
    simplify: true

  govet:
    enable-all: true
    disable:
      - shadow
      - fieldalignment

  misspell:
    locale: US

  dogsled:
    max-blank-identifiers: 2

  prealloc:
    simple: true
    range-loops: true
    for-loops: true

issues:
  exclude-dirs:
    - bazel-bin
    - bazel-out
    - bazel-testlogs
    - bazel-cloud-update
    - vendor
    - .git

  exclude-files:
    - ".*\\.pb\\.go$"
    - ".*\\.gen\\.go$"
    - "mock_.*\\.go$"

  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - gosec
        - dupl
        - lll

    # Exclude some linters from running on bazel files
    - path: BUILD\.bazel
      linters:
        - deadcode

    # Exclude some linters on main files
    - path: main\.go
      linters:
        - gochecknoglobals

  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
  tests: true
  build-tags:
    - integration

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true
